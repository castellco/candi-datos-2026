name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite correrlo manualmente desde GitHub Actions

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            https://castellco:$HF_TOKEN@huggingface.co/spaces/castellco/candi-datos-2026 \
            main
