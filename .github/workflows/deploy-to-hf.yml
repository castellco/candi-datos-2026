name: Deploy to Hugging Face Space
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"

      - name: Clone HF Space repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://${HF_TOKEN}@huggingface.co/spaces/castellco/candi-datos-2026 hf-space

      - name: Sync files to HF Space
        run: |
          rsync -av --delete --exclude='.git' ./ hf-space/
          cd hf-space
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Auto-deploy from GitHub: $GITHUB_SHA"
            git push origin main
          else
            echo "No changes to deploy"
          fi