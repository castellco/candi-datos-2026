crear_labels_unicos <- function(nombres, largo = 25) {
  truncados <- str_trunc(nombres, largo)
  dupes <- duplicated(truncados) | duplicated(truncados, fromLast = TRUE)
  if (any(dupes)) {
    idx_list <- split(seq_along(truncados)[dupes], truncados[dupes])
    for (grp in idx_list) {
      for (k in seq_along(grp)) {
        truncados[grp[k]] <- paste0(str_trunc(nombres[grp[k]], largo - 4), " (", k, ")")
      }
    }
  }
  setNames(truncados, nombres)
}

# ── 3. FIXME → CORREGIDO: Stacked 100% público vs privado por partido ─────────

output$plot_ingreso_tipo <- renderPlotly({
  base <- fc_uniq() |>
    summarise(
      publico = sum(rem_publico_num, na.rm = TRUE),
      privado = sum(rem_privado_num, na.rm = TRUE),
      .by = partido
    ) |>
    filter(publico + privado > 0) |>
    mutate(
      total     = publico + privado,
      pct_pub   = round(publico / total * 100, 1),
      pct_priv  = round(privado / total * 100, 1),
      label_eje = label_partido[partido]
    ) |>
    arrange(pct_pub)

  validate(need(nrow(base) > 0, "Sin datos de remuneraciones en la selección."))

  # Formato largo: una fila por partido × tipo
  largo <- base |>
    pivot_longer(cols = c(pct_pub, pct_priv),
                 names_to = "tipo", values_to = "pct") |>
    mutate(
      tipo_label = if_else(tipo == "pct_pub", "Público", "Privado"),
      color      = if_else(tipo == "pct_pub", rojo, blanco),
      tooltip    = paste0(partido, "<br>", tipo_label, ": ", pct, "%")
    )

  # Orden del eje y: categoryorder en lugar de factor() que plotly no procesa
  nivel_orden <- base$label_eje
  label_n_pub <- n_label(fc_uniq())

  plot_ly(largo |> filter(tipo == "pct_pub"),
    x = ~pct, y = ~partido,
    name = "Público", type = "bar", orientation = "h",
    marker = list(color = rojo),

    legend = list(orientation = "h", x = 0.5, xanchor = "center", y = 1.08,
                  font = list(color = blanco, family = "Cabin")),

# ── 4. FIXME → CORREGIDO: Stacked 100% distribución por sexo por partido ──────
# Problema anterior: factor(label_eje, levels = orden) fallaba cuando algún partido
# no tenía ambos sexos. Solución: pivot_longer con complete() para rellenar huecos.

output$plot_sexo_partido <- renderPlotly({
  base <- fc_uniq() |>
    filter(!is.na(sexo)) |>
    count(partido, sexo, name = "n") |>
    # Garantizar que cada partido tenga fila para cada sexo (relleno con 0)
    complete(partido, sexo, fill = list(n = 0)) |>
    group_by(partido) |>
    mutate(total = sum(n),
           pct   = if_else(total > 0, round(n / total * 100, 1), 0)) |>
    ungroup() |>
    mutate(label_eje = label_partido[partido])

  validate(need(nrow(base) > 0, "Sin datos para mostrar."))

  orden       <- base |> filter(sexo == "Femenino") |> arrange(pct) |> pull(label_eje)
  label_n_sex <- n_label(fc_uniq())

  base_fem  <- base |> filter(sexo == "Femenino")

output$tabla_partidos <- DT::renderDT({

<script type="application/shiny-prerendered" data-context="server-extras">
ojs_define <- function(..., .session = shiny::getDefaultReactiveDomain()) {
  quos <- rlang::enquos(...)
  vars <- rlang::list2(...)
  nm <- names(vars)
  if (is.null(nm)) {
    nm <- rep_len("", length(vars))
  }
  mapply(
    function(q, nm, val) {
      # Infer name, if possible
      if (nm == "") {
        tryCatch(
          {
            nm <- rlang::as_name(q)
          },
          error = function(e) {
            code <- paste(collapse = "\n", deparse(rlang::f_rhs(q)))
            stop(
              "ojs_define() could not create a name for the argument: ",
              code
            )
          }
        )
      }
      .session$output[[nm]] <- val
      outputOptions(.session$output, nm, suspendWhenHidden = FALSE)
      .session$sendCustomMessage("ojs-export", list(name = nm))
      NULL
    },
    quos,
    nm,
    vars,
    SIMPLIFY = FALSE,
    USE.NAMES = FALSE
  )
  invisible()
}

          elRect = undefined;
          if (selectedAnnoteEl) {
            selectCodeLines(selectedAnnoteEl);
          }
        }, 10)
      );
      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
      }
        // Attach click handler to the DT
        const annoteDls = window.document.querySelectorAll('dt[data-target-cell]');
        for (const annoteDlNode of annoteDls) {
          annoteDlNode.addEventListener('click', (event) => {
            const clickedEl = event.target;
            if (clickedEl !== selectedAnnoteEl) {
              unselectCodeLines();
              const activeEl = window.document.querySelector('dt[data-target-cell].code-annotation-active');
              if (activeEl) {
                activeEl.classList.remove('code-annotation-active');
              }
              selectCodeLines(clickedEl);
              clickedEl.classList.add('code-annotation-active');
            } else {
              // Unselect the line
              unselectCodeLines();
              clickedEl.classList.remove('code-annotation-active');
            }
          });
        }
    const findCites = (el) => {
      const parentEl = el.parentElement;
      if (parentEl) {
        const cites = parentEl.dataset.cites;
        if (cites) {
          return {
            el,
            cites: cites.split(' ')
          };
        } else {
          return findCites(el.parentElement)
        }
      } else {
        return undefined;
      }
    };
    var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
    for (var i=0; i<bibliorefs.length; i++) {
      const ref = bibliorefs[i];
      const citeInfo = findCites(ref);
      if (citeInfo) {
        tippyHover(citeInfo.el, function() {
          var popup = window.document.createElement('div');
          citeInfo.cites.forEach(function(cite) {
            var citeDiv = window.document.createElement('div');
            citeDiv.classList.add('hanging-indent');
            citeDiv.classList.add('csl-entry');
            var biblioDiv = window.document.getElementById('ref-' + cite);
            if (biblioDiv) {
              citeDiv.innerHTML = biblioDiv.innerHTML;
            }
            popup.appendChild(citeDiv);
          });
          return popup.innerHTML;
        });
      }
    }
  });
  </script>
